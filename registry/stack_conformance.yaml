  - id: stocksharp
    display_name: StockSharp
    claim: partial
    spec_markers_any:
      - "| StockSharp | execution/QUIK bridge | chosen"
    runtime_proof:
      files_any:
        - src/trading_advisor_3000/app/execution/adapters/stocksharp_sidecar_stub.py
