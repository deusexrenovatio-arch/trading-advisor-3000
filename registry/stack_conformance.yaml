version: 1

truth_sources:
  status_doc: docs/architecture/product-plane/STATUS.md
  spec_doc: docs/architecture/product-plane/product-plane-spec-v2/07_Tech_Stack_and_Open_Source.md
  pyproject: pyproject.toml

closure_claim_guard:
  documents:
    - docs/architecture/product-plane/README.md
    - docs/architecture/product-plane/stack-conformance-baseline.md
    - docs/architecture/product-plane/STATUS.md
  document_globs:
    - docs/checklists/app/*.md
    - docs/architecture/product-plane/phase*-acceptance-*.md
  forbidden_terms:
    - full DoD
    - full acceptance
    - final closure
    - production ready
    - live ready
    - release ready

surface_claims:
  - id: product_plane_landing
    status_label: Product-plane landing in shell repo
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/product_plane/__init__.py
        - docs/architecture/product-plane/README.md
      tests_any:
        - tests/product-plane/test_app_plane_metadata.py

  - id: data_research_runtime_scaffolding
    status_label: Data/research/runtime scaffolding
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/product_plane/data_plane/__init__.py
        - src/trading_advisor_3000/product_plane/research/__init__.py
        - src/trading_advisor_3000/product_plane/runtime/__init__.py
      tests_any:
        - tests/product-plane/integration/test_phase2a_data_plane.py
        - tests/product-plane/integration/test_phase2b_research_plane.py
        - tests/product-plane/integration/test_phase2c_runtime.py

  - id: runtime_signal_lifecycle
    status_label: Runtime signal lifecycle
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/product_plane/runtime/pipeline.py
        - src/trading_advisor_3000/product_plane/runtime/decision/engine.py
        - src/trading_advisor_3000/product_plane/runtime/signal_store/store.py
      tests_any:
        - tests/product-plane/integration/test_phase2c_runtime.py

  - id: durable_runtime_state
    status_label: Durable runtime state
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/product_plane/runtime/bootstrap.py
        - src/trading_advisor_3000/product_plane/runtime/signal_store/postgres.py
      dependencies_any:
        - psycopg
      tests_any:
        - tests/product-plane/integration/test_phase2c_runtime_postgres_store.py
        - tests/product-plane/unit/test_phase6_runtime_durable_bootstrap.py

  - id: service_api_runtime_surface
    status_label: Service/API runtime surface
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/product_plane/interfaces/asgi.py
      dependencies_any:
        - fastapi
      tests_any:
        - tests/product-plane/unit/test_phase6_fastapi_smoke.py

  - id: paper_execution_path
    status_label: Paper execution path
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/product_plane/execution/intents/paper_broker.py
        - src/trading_advisor_3000/product_plane/execution/reconciliation/reconcile.py
      tests_any:
        - tests/product-plane/integration/test_phase2d_execution.py

  - id: live_execution_transport_baseline
    status_label: Live execution transport baseline
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/product_plane/execution/adapters/stocksharp_http_transport.py
        - deployment/stocksharp-sidecar/src/TradingAdvisor3000.StockSharpSidecar/Program.cs
        - scripts/smoke_stocksharp_sidecar_binary.py
      tests_any:
        - tests/product-plane/unit/test_real_execution_http_transport.py
        - tests/product-plane/unit/test_phase8_dotnet_sidecar_assets.py

  - id: real_broker_process
    status_label: StockSharp/QUIK/Finam real broker process
    claim: planned
    runtime_proof:
      files_all:
        - scripts/run_f1e_real_broker_process.py
        - docs/runbooks/app/f1e-real-broker-process-runbook.md
        - docs/architecture/product-plane/f1e-real-broker-process-closure.md
        - src/trading_advisor_3000/product_plane/contracts/schemas/real_broker_process_report.v1.json
      tests_any:
        - tests/process/test_run_f1e_real_broker_process.py
        - tests/product-plane/contracts/test_phase5_real_broker_process_contracts.py
        - tests/product-plane/integration/test_real_execution_staging_rollout.py

  - id: contracts_freeze
    status_label: Contracts freeze
    claim: implemented
    runtime_proof:
      files_all:
        - docs/architecture/product-plane/CONTRACT_SURFACES.md
      tests_any:
        - tests/product-plane/contracts/test_phase1_contracts.py

  - id: production_readiness
    status_label: Production readiness / operational readiness
    claim: not accepted

technology_claims:
  - id: delta_lake
    display_name: Delta Lake
    claim: partial
    spec_markers_any:
      - "| Delta Lake | durable data tables | chosen"
    runtime_proof:
      dependencies_any:
        - deltalake
      files_all:
        - src/trading_advisor_3000/product_plane/data_plane/delta_runtime.py
        - src/trading_advisor_3000/product_plane/data_plane/pipeline.py
        - src/trading_advisor_3000/product_plane/research/backtest/engine.py
      tests_any:
        - tests/product-plane/integration/test_phase2a_data_plane.py
        - tests/product-plane/integration/test_phase2b_research_plane.py

  - id: apache_spark
    display_name: Apache Spark
    claim: partial
    spec_markers_any:
      - "| Apache Spark | heavy compute / rebuilds | chosen"
    runtime_proof:
      dependencies_any:
        - delta-spark
      files_all:
        - src/trading_advisor_3000/spark_jobs/canonical_bars_job.py
        - scripts/run_phase2a_spark_proof.py
        - deployment/docker/phase-proofs/Dockerfile
      tests_any:
        - tests/product-plane/integration/test_phase2a_spark_execution.py

  - id: dagster
    display_name: Dagster
    claim: partial
    spec_markers_any:
      - "| Dagster | orchestration | chosen"
    runtime_proof:
      dependencies_any:
        - dagster
      files_all:
        - src/trading_advisor_3000/dagster_defs/phase2a_assets.py
        - scripts/run_phase2a_dagster_proof.py
      tests_any:
        - tests/product-plane/integration/test_phase2a_dagster_execution.py
        - tests/product-plane/unit/test_phase2a_manifests.py

  - id: polars
    display_name: Polars
    claim: removed
    spec_markers_any:
      - "| Polars | fast local dataframe compute | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/product-plane/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - ADR-011

  - id: duckdb
    display_name: DuckDB
    claim: removed
    spec_markers_any:
      - "| DuckDB | local SQL and Delta/Parquet access | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/product-plane/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - ADR-011

  - id: postgresql
    display_name: PostgreSQL
    claim: partial
    spec_markers_any:
      - "| PostgreSQL | runtime state | chosen"
    runtime_proof:
      dependencies_any:
        - psycopg
      files_any:
        - src/trading_advisor_3000/product_plane/runtime/signal_store/postgres.py

  - id: vectorbt
    display_name: vectorbt
    claim: removed
    spec_markers_any:
      - "| vectorbt | backtest/research | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/product-plane/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - ADR-011

  - id: fastapi
    display_name: FastAPI
    claim: implemented
    spec_markers_any:
      - "| FastAPI | service/API layer | chosen"
    runtime_proof:
      dependencies_any:
        - fastapi
      entrypoints_any:
        - src/trading_advisor_3000/product_plane/interfaces/asgi.py
        - src/trading_advisor_3000/product_plane/interfaces/http_api.py
      tests_any:
        - tests/product-plane/unit/test_phase6_fastapi_smoke.py

  - id: aiogram
    display_name: aiogram
    claim: removed
    spec_markers_any:
      - "| aiogram | Telegram integration | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/product-plane/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - ADR-011

  - id: alembic
    display_name: Alembic
    claim: removed
    spec_markers_any:
      - "| Alembic | DB migrations | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/product-plane/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - ADR-011

  - id: opentelemetry
    display_name: OpenTelemetry
    claim: removed
    spec_markers_any:
      - "| OpenTelemetry | tracing/metrics/log correlation | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/product-plane/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - ADR-011

  - id: dotnet_sidecar
    display_name: .NET 8
    claim: implemented
    spec_markers_any:
      - "| .NET 8 | execution sidecar runtime | chosen"
    runtime_proof:
      files_all:
        - deployment/stocksharp-sidecar/TradingAdvisor3000.StockSharpSidecar.sln
        - deployment/stocksharp-sidecar/src/TradingAdvisor3000.StockSharpSidecar/TradingAdvisor3000.StockSharpSidecar.csproj
        - deployment/stocksharp-sidecar/tests/TradingAdvisor3000.StockSharpSidecar.Tests/TradingAdvisor3000.StockSharpSidecar.Tests.csproj
        - deployment/stocksharp-sidecar/scripts/prove.ps1
        - scripts/smoke_stocksharp_sidecar_binary.py
      tests_any:
        - tests/product-plane/unit/test_phase8_dotnet_sidecar_assets.py

  - id: stocksharp
    display_name: StockSharp
    claim: partial
    spec_markers_any:
      - "| StockSharp | execution/QUIK bridge | chosen"
    runtime_proof:
      files_any:
        - src/trading_advisor_3000/product_plane/execution/adapters/stocksharp_sidecar_stub.py
        - src/trading_advisor_3000/product_plane/execution/adapters/stocksharp_http_transport.py
      tests_any:
        - tests/product-plane/unit/test_real_execution_http_transport.py
