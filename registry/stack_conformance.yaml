version: 1

truth_sources:
  status_doc: docs/architecture/app/STATUS.md
  spec_doc: docs/architecture/app/product-plane-spec-v2/07_Tech_Stack_and_Open_Source.md
  pyproject: pyproject.toml

closure_claim_guard:
  documents:
    - docs/architecture/app/README.md
    - docs/architecture/app/stack-conformance-baseline.md
    - docs/architecture/app/STATUS.md
    - docs/architecture/app/phase10-stack-conformance-reacceptance-report.md
    - artifacts/acceptance/f1/red-team-review-result.md
    - artifacts/acceptance/f1/reacceptance-evidence-pack.json
    - docs/codex/modules/f1-full-closure.phase-01.md
    - docs/codex/modules/f1-full-closure.phase-02.md
  document_globs:
    - docs/checklists/app/*.md
    - docs/architecture/app/phase*-acceptance-*.md
  forbidden_terms:
    - full DoD
    - full acceptance
    - final closure
    - production ready
    - live ready
    - release ready

removed_claim_guard:
  documents:
    - docs/architecture/app/phase10-stack-conformance-reacceptance-report.md
    - artifacts/acceptance/f1/red-team-review-result.md
    - artifacts/acceptance/f1/reacceptance-evidence-pack.json
    - docs/codex/modules/f1-full-closure.phase-01.md
    - docs/codex/modules/f1-full-closure.phase-02.md
  phrase_markers_any:
    - removed by ADR
    - ADR-backed removal
    - removed through ADR
  skip_markers_any:
    - unsupported phrase
    - confirm validation fails
    - confirm the phase fails

removed_technology_active_guard:
  documents:
    - docs/architecture/app/product-plane-spec-v2/01_Architecture_Overview.md
    - docs/architecture/app/product-plane-spec-v2/04_ADRs.md
    - docs/architecture/app/product-plane-spec-v2/08_Codex_AI_Shell_Integration.md
  neutral_markers_any:
    - removed
    - replaced
    - superseded
    - adr-011

terminal_technology_guard:
  technology_ids:
    - aiogram
    - polars
    - duckdb
    - vectorbt
    - alembic
    - opentelemetry
  terminal_claims:
    - implemented
    - removed

surface_claims:
  - id: product_plane_landing
    status_label: Product-plane landing in shell repo
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/app/__init__.py
        - docs/architecture/app/README.md
      tests_any:
        - tests/app/test_app_plane_metadata.py

  - id: data_research_runtime_scaffolding
    status_label: Data/research/runtime scaffolding
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/app/data_plane/__init__.py
        - src/trading_advisor_3000/app/research/__init__.py
        - src/trading_advisor_3000/app/runtime/__init__.py
      tests_any:
        - tests/app/integration/test_phase2a_data_plane.py
        - tests/app/integration/test_phase2b_research_plane.py
        - tests/app/integration/test_phase2c_runtime.py

  - id: runtime_signal_lifecycle
    status_label: Runtime signal lifecycle
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/app/runtime/pipeline.py
        - src/trading_advisor_3000/app/runtime/decision/engine.py
        - src/trading_advisor_3000/app/runtime/signal_store/store.py
      tests_any:
        - tests/app/integration/test_phase2c_runtime.py

  - id: durable_runtime_state
    status_label: Durable runtime state
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/app/runtime/bootstrap.py
        - src/trading_advisor_3000/app/runtime/signal_store/postgres.py
      dependencies_any:
        - psycopg
      tests_any:
        - tests/app/integration/test_phase2c_runtime_postgres_store.py
        - tests/app/unit/test_phase6_runtime_durable_bootstrap.py

  - id: service_api_runtime_surface
    status_label: Service/API runtime surface
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/app/interfaces/asgi.py
      dependencies_any:
        - fastapi
      tests_any:
        - tests/app/unit/test_phase6_fastapi_smoke.py

  - id: paper_execution_path
    status_label: Paper execution path
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/app/execution/intents/paper_broker.py
        - src/trading_advisor_3000/app/execution/reconciliation/reconcile.py
      tests_any:
        - tests/app/integration/test_phase2d_execution.py

  - id: live_execution_transport_baseline
    status_label: Live execution transport baseline
    claim: implemented
    runtime_proof:
      files_all:
        - src/trading_advisor_3000/app/execution/adapters/stocksharp_http_transport.py
        - deployment/stocksharp-sidecar/src/TradingAdvisor3000.StockSharpSidecar/Program.cs
        - scripts/smoke_stocksharp_sidecar_binary.py
      tests_any:
        - tests/app/unit/test_real_execution_http_transport.py
        - tests/app/unit/test_phase8_dotnet_sidecar_assets.py

  - id: real_broker_process
    status_label: StockSharp/QUIK/Finam real broker process
    claim: planned

  - id: contracts_freeze
    status_label: Contracts freeze
    claim: partial
    runtime_proof:
      files_all:
        - docs/architecture/app/CONTRACT_SURFACES.md
      tests_any:
        - tests/app/contracts/test_phase1_contracts.py

  - id: production_readiness
    status_label: Production readiness / operational readiness
    claim: not accepted

technology_claims:
  - id: delta_lake
    display_name: Delta Lake
    claim: partial
    spec_markers_any:
      - "| Delta Lake | durable data tables | chosen"
    runtime_proof:
      dependencies_any:
        - deltalake
      files_all:
        - src/trading_advisor_3000/app/data_plane/delta_runtime.py
        - src/trading_advisor_3000/app/data_plane/pipeline.py
        - src/trading_advisor_3000/app/research/backtest/engine.py
      tests_any:
        - tests/app/integration/test_phase2a_data_plane.py
        - tests/app/integration/test_phase2b_research_plane.py

  - id: apache_spark
    display_name: Apache Spark
    claim: partial
    spec_markers_any:
      - "| Apache Spark | heavy compute / rebuilds | chosen"
    runtime_proof:
      dependencies_any:
        - delta-spark
      files_all:
        - src/trading_advisor_3000/spark_jobs/canonical_bars_job.py
        - scripts/run_phase2a_spark_proof.py
        - deployment/docker/phase-proofs/Dockerfile
      tests_any:
        - tests/app/integration/test_phase2a_spark_execution.py

  - id: dagster
    display_name: Dagster
    claim: partial
    spec_markers_any:
      - "| Dagster | orchestration | chosen"
    runtime_proof:
      dependencies_any:
        - dagster
      files_all:
        - src/trading_advisor_3000/dagster_defs/phase2a_assets.py
        - scripts/run_phase2a_dagster_proof.py
      tests_any:
        - tests/app/integration/test_phase2a_dagster_execution.py
        - tests/app/unit/test_phase2a_manifests.py

  - id: polars
    display_name: Polars
    claim: removed
    spec_markers_any:
      - "| Polars | fast local dataframe compute | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/app/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - adr-011
        - polars removed by adr
        - pyarrow local dataframe path

  - id: duckdb
    display_name: DuckDB
    claim: removed
    spec_markers_any:
      - "| DuckDB | local SQL and Delta/Parquet access | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/app/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - adr-011
        - duckdb removed by adr
        - delta lake plus pyarrow local query path

  - id: postgresql
    display_name: PostgreSQL
    claim: partial
    spec_markers_any:
      - "| PostgreSQL | runtime state | chosen"
    runtime_proof:
      dependencies_any:
        - psycopg
      files_any:
        - src/trading_advisor_3000/app/runtime/signal_store/postgres.py

  - id: vectorbt
    display_name: vectorbt
    claim: removed
    spec_markers_any:
      - "| vectorbt | backtest/research | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/app/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - adr-011
        - vectorbt removed by adr
        - internal backtest engine

  - id: fastapi
    display_name: FastAPI
    claim: implemented
    spec_markers_any:
      - "| FastAPI | service/API layer | chosen"
    runtime_proof:
      dependencies_any:
        - fastapi
      entrypoints_any:
        - src/trading_advisor_3000/app/interfaces/asgi.py
        - src/trading_advisor_3000/app/interfaces/http_api.py
      tests_any:
        - tests/app/unit/test_phase6_fastapi_smoke.py

  - id: aiogram
    display_name: aiogram
    claim: removed
    spec_markers_any:
      - "| aiogram | Telegram integration | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/app/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - adr-011
        - aiogram removed by adr
        - custom bot api engine

  - id: alembic
    display_name: Alembic
    claim: removed
    spec_markers_any:
      - "| Alembic | DB migrations | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/app/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - adr-011
        - alembic removed by adr
        - sql migration runner

  - id: opentelemetry
    display_name: OpenTelemetry
    claim: removed
    spec_markers_any:
      - "| OpenTelemetry | tracing/metrics/log correlation | chosen"
    replacement:
      adr_required_when_removed: true
      adr_paths_any:
        - docs/architecture/app/product-plane-spec-v2/04_ADRs.md
      adr_markers_any:
        - adr-011
        - opentelemetry removed by adr
        - prometheus loki observability path

  - id: dotnet_sidecar
    display_name: .NET 8
    claim: implemented
    spec_markers_any:
      - "| .NET 8 | execution sidecar runtime | chosen"
    runtime_proof:
      files_all:
        - deployment/stocksharp-sidecar/TradingAdvisor3000.StockSharpSidecar.sln
        - deployment/stocksharp-sidecar/src/TradingAdvisor3000.StockSharpSidecar/TradingAdvisor3000.StockSharpSidecar.csproj
        - deployment/stocksharp-sidecar/tests/TradingAdvisor3000.StockSharpSidecar.Tests/TradingAdvisor3000.StockSharpSidecar.Tests.csproj
        - deployment/stocksharp-sidecar/scripts/prove.ps1
        - scripts/smoke_stocksharp_sidecar_binary.py
      tests_any:
