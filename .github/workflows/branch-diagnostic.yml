name: branch-diagnostic

on:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  branch-lane:
    if: ${{ vars.AI_SHELL_ENABLE_HOSTED_CI == '1' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev-test]

      - name: Bootstrap Dry Run
        run: python scripts/install_git_hooks.py --dry-run --allow-no-git

      - name: Tracked Secret Scan
        run: python scripts/validate_no_tracked_secrets.py

      - name: Resolve Diff Range
        id: diff-range
        shell: bash
        run: |
          git fetch origin main --prune
          if [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          elif git rev-parse origin/main >/dev/null 2>&1; then
            echo "base_ref=$(git merge-base origin/main HEAD)" >> "$GITHUB_OUTPUT"
            echo "head_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "base_ref=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
            echo "head_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Branch Diagnostic Gate
        shell: bash
        run: |
          mkdir -p artifacts/ci
          if [[ -n "${{ steps.diff-range.outputs.base_ref }}" && -n "${{ steps.diff-range.outputs.head_ref }}" ]]; then
            python scripts/run_loop_gate.py --base-ref "${{ steps.diff-range.outputs.base_ref }}" --head-ref "${{ steps.diff-range.outputs.head_ref }}" --snapshot-mode changed-files --profile none --summary-file artifacts/ci/loop-gate-summary.md
          else
            python scripts/run_loop_gate.py --from-git --git-ref HEAD --snapshot-mode changed-files --profile none --summary-file artifacts/ci/loop-gate-summary.md
          fi

      - name: Upload Branch Lane Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: branch-lane-surface-summary
          path: artifacts/ci/loop-gate-summary.md
          if-no-files-found: warn
