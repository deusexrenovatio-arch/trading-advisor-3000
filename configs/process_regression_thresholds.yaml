version: 1
# Keep process-regression gating in burn-in until the repo has a larger terminal-task sample.
window_size: 40
burn_in_min_completed_tasks: 60
thresholds:
  correct_first_time_pct: 0.70
  start_match_pct: 0.75
  context_expansion_rate: 0.25
  repeat_error_rate: 0.15
  environment_blocker_rate: 0.20
