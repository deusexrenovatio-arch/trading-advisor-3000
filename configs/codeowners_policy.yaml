version: 1

required_patterns:
  - "*"
  - "/AGENTS.md"
  - "/harness-guideline.md"
  - "/docs/agent/"
  - "/docs/agent-contexts/"
  - "/docs/workflows/"
  - "/docs/runbooks/"
  - "/configs/"
  - "/scripts/"
  - "/tests/"
  - "/src/trading_advisor_3000/"
