version: 1

surface_priority:
  - contracts
  - architecture
  - app-runtime
  - app-data
  - app
  - skills
  - governance
  - docs-only

surfaces:
  contracts:
    prefixes:
      - configs/
      - registry/
      - plans/
      - memory/
      - docs/checklists/
      - scripts/validate_task_request_contract.py
      - scripts/critical_contours.py
      - scripts/validate_solution_intent.py
      - scripts/validate_critical_contour_closure.py
      - scripts/validate_plans.py
      - scripts/validate_agent_memory.py
      - scripts/validate_task_outcomes.py
      - scripts/validate_stack_conformance.py
      - scripts/sync_task_outcomes.py
      - scripts/sync_state_layout.py
  architecture:
    prefixes:
      - docs/architecture/
      - tests/architecture/
  app-runtime:
    prefixes:
      - src/trading_advisor_3000/product_plane/runtime/
      - src/trading_advisor_3000/product_plane/interfaces/
      - src/trading_advisor_3000/product_plane/execution/
      - src/trading_advisor_3000/product_plane/config/
      - src/trading_advisor_3000/product_plane/common/
      - src/trading_advisor_3000/product_plane/contracts/
      - tests/product-plane/unit/test_runtime_
      - tests/product-plane/unit/test_live_bridge_
      - tests/product-plane/unit/test_production_profile_
      - tests/product-plane/unit/test_recovery_and_idempotency.py
      - tests/product-plane/unit/test_real_execution_http_transport.py
      - tests/product-plane/unit/test_real_execution_runtime_profile_ops.py
      - tests/product-plane/unit/test_real_execution_staging_gateway_deployment.py
      - tests/product-plane/integration/test_runtime_
      - tests/product-plane/integration/test_execution_flow.py
      - tests/product-plane/integration/test_controlled_live_execution.py
      - tests/product-plane/integration/test_operational_hardening.py
      - tests/process/test_run_f1d_sidecar_immutable_evidence.py
      - tests/process/test_run_f1e_real_broker_process.py
      - scripts/run_f1d_sidecar_immutable_evidence.py
      - scripts/run_f1e_real_broker_process.py
  app-data:
    prefixes:
      - src/trading_advisor_3000/product_plane/data_plane/
      - src/trading_advisor_3000/product_plane/research/
      - src/trading_advisor_3000/dagster_defs/
      - src/trading_advisor_3000/spark_jobs/
      - tests/product-plane/unit/test_historical_data_
      - tests/product-plane/unit/test_research_
      - tests/product-plane/integration/test_historical_data_
      - tests/product-plane/integration/test_research_
      - scripts/run_historical_data_spark_proof.py
      - scripts/run_historical_data_dagster_proof.py
  app:
    prefixes:
      - src/trading_advisor_3000/
      - tests/product-plane/
  skills:
    prefixes:
      - .cursor/skills/
      - docs/agent/skills-
      - docs/workflows/skill-governance-sync.md
      - scripts/validate_skills.py
  governance:
    prefixes:
      - AGENTS.md
      - README.md
      - CODEOWNERS
      - docs/agent/
      - docs/workflows/
      - docs/runbooks/
      - docs/tasks/
      - docs/session_handoff.md
      - scripts/
      - tests/process/
      - .githooks/
      - .github/workflows/

docs_only:
  prefixes:
    - docs/
  suffixes:
    - .md
    - .txt
    - .rst

command_profiles:
  loop:
    default:
      - "{python} scripts/validate_docs_links.py --roots AGENTS.md docs"
      - "{python} scripts/validate_legacy_namespace_growth.py"
      - "{python} scripts/validate_product_surface_naming.py"
    contracts:
      - "{python} scripts/validate_stack_conformance.py"
      - "{python} scripts/validate_task_request_contract.py"
      - "{python} scripts/validate_plans.py"
      - "{python} scripts/validate_agent_memory.py"
      - "{python} scripts/validate_task_outcomes.py"
    architecture:
      - "{python} scripts/validate_stack_conformance.py"
      - "{python} scripts/validate_architecture_policy.py"
    app:
      - "{python} scripts/validate_stack_conformance.py"
    governance:
      - "{python} scripts/validate_stack_conformance.py"
      - "{python} scripts/validate_plans.py"
      - "{python} scripts/validate_agent_memory.py"
      - "{python} scripts/validate_task_outcomes.py"
      - "{python} scripts/validate_session_handoff.py"
      - "{python} scripts/validate_task_request_contract.py"
      - "{python} scripts/validate_pr_only_policy.py"
      - "{python} scripts/validate_agent_contexts.py"
      - "{python} scripts/validate_mcp_config.py"
      - "{python} scripts/validate_no_tracked_secrets.py"
    skills:
      - "{python} scripts/skill_precommit_gate.py"
      - "{python} scripts/validate_skills.py"

  pr:
    default:
      - "{python} scripts/run_loop_gate.py --skip-session-check"
      - "{python} scripts/validate_task_outcomes.py --require-terminal-outcome"
      - "{python} -m pytest tests/process/test_governance_shell_baseline.py"
    contracts:
      - "{python} -m pytest tests/process/test_validate_plans_contract.py -q"
      - "{python} -m pytest tests/process/test_validate_task_request_contract.py -q"
      - "{python} -m pytest tests/process/test_critical_contours.py -q"
      - "{python} -m pytest tests/architecture/test_context_coverage.py -q"
    architecture:
      - "{python} -m pytest tests/architecture -q"
    app-runtime:
      - "{python} scripts/run_surface_pr_matrix.py"
    app-data:
      - "{python} scripts/run_surface_pr_matrix.py"
    app:
      - "{python} scripts/run_surface_pr_matrix.py"

  nightly:
    default:
      - "{python} scripts/run_pr_gate.py --skip-session-check"
      - "{python} scripts/validate_process_regressions.py"
      - "{python} scripts/nightly_root_hygiene.py"
      - "{python} scripts/validate_mcp_config.py"
      - "{python} scripts/validate_no_tracked_secrets.py"
      - "{python} scripts/sync_state_layout.py"
      - "{python} scripts/measure_dev_loop.py --format markdown --output artifacts/dev-loop-baseline.md"
      - "{python} scripts/validate_architecture_policy.py"
      - "{python} scripts/validate_docs_links.py --roots AGENTS.md docs"
      - "{python} scripts/validate_governance_remediation.py"
      - "{python} scripts/harness_baseline_metrics.py --output artifacts/harness-baseline-metrics.json"
      - "{python} scripts/process_improvement_report.py --output artifacts/process-improvement-report.md"
      - "{python} scripts/autonomy_kpi_report.py --output artifacts/autonomy-kpi-report.md"
      - "{python} scripts/build_governance_dashboard.py --output-json artifacts/governance-dashboard.json --output-md artifacts/governance-dashboard.md"
