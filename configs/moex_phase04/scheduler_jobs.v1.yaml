version: 1
scheduler_system: dagster
max_tick_age_minutes: 180
max_queued_runs_per_job: 0

jobs:
  - job_id: moex_candleborders_discovery
    required: true
    cron: "0 6 * * *"
    retry:
      max_attempts: 3
      backoff_seconds: [30, 120, 300]
  - job_id: moex_backfill_bootstrap
    required: true
    cron: "0 21 * * *"
    execution:
      mode: parallel_sharded
      worker_count: 4
      shard_strategy: round_robin_active_universe
      entrypoint: scripts/run_moex_nightly_backfill.py
      expected_completion_local: "06:00"
    retry:
      max_attempts: 4
      backoff_seconds: [30, 120, 300, 600]
  - job_id: moex_incremental_ingest
    required: true
    cron: "*/15 * * * *"
    retry:
      max_attempts: 4
      backoff_seconds: [15, 45, 120, 300]
  - job_id: finam_live_snapshot_ingest
    required: true
    cron: "*/10 * * * *"
    retry:
      max_attempts: 4
      backoff_seconds: [10, 30, 90, 240]
  - job_id: canonical_bars_builder
    required: true
    cron: "5-59/15 * * * *"
    retry:
      max_attempts: 3
      backoff_seconds: [30, 120, 300]
  - job_id: resampling_builder
    required: true
    cron: "7-59/15 * * * *"
    retry:
      max_attempts: 3
      backoff_seconds: [30, 120, 300]
  - job_id: cross_source_reconciliation
    required: true
    cron: "10-59/15 * * * *"
    retry:
      max_attempts: 3
      backoff_seconds: [30, 120, 300]
  - job_id: qc_gate_and_publish
    required: true
    cron: "12-59/15 * * * *"
    retry:
      max_attempts: 2
      backoff_seconds: [30, 90]
