<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TA3000 Data Inspector</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #657184;
      --line: #d8dde6;
      --accent: #146c94;
      --accent-strong: #0b4f70;
      --good: #0b7a53;
      --bad: #a33a2a;
      --warn: #8a6412;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      min-width: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
      flex: 0 0 auto;
    }

    .dot.ok {
      background: var(--good);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(190px, 1fr) repeat(5, minmax(120px, 0.6fr)) auto;
      gap: 12px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: #eef2f6;
      align-items: end;
    }

    .parameter-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: #f7f9fb;
    }

    .parameter-bar:empty {
      display: none;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    select,
    input,
    button {
      height: 36px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      border-radius: 6px;
    }

    select,
    input {
      width: 100%;
      padding: 0 10px;
    }

    button {
      padding: 0 14px;
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    main {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 0;
      min-height: 0;
    }

    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      overflow: auto;
    }

    .layer-list {
      display: grid;
      gap: 1px;
      background: var(--line);
    }

    .layer {
      border: 0;
      background: var(--panel);
      color: var(--ink);
      border-radius: 0;
      height: auto;
      padding: 14px 16px;
      text-align: left;
      display: grid;
      gap: 6px;
    }

    .layer.active {
      border-left: 4px solid var(--accent);
      padding-left: 12px;
      background: #fafdff;
    }

    .layer-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 700;
    }

    .layer-meta,
    .layer-path,
    .empty,
    .error {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .tag {
      font-size: 11px;
      font-weight: 700;
      color: var(--good);
      white-space: nowrap;
    }

    .tag.missing {
      color: var(--bad);
    }

    .content {
      min-width: 0;
      overflow: auto;
      padding: 18px 22px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      margin-bottom: 4px;
    }

    .metric strong {
      display: block;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      max-height: calc(100vh - 280px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      white-space: nowrap;
    }

    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: #f0f4f8;
      z-index: 1;
      font-weight: 750;
    }

    td {
      font-variant-numeric: tabular-nums;
    }

    .error {
      color: var(--bad);
      font-weight: 650;
      padding: 12px 0;
    }

    @media (max-width: 980px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      main {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: 260px;
      }

      .summary {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <h1>TA3000 Data Inspector</h1>
      <div class="status"><span id="statusDot" class="dot"></span><span id="statusText">Loading</span></div>
    </header>

    <section class="toolbar" aria-label="Data controls">
      <label>
        Instrument
        <select id="instrumentSelect"></select>
      </label>
      <label>
        Timeframe
        <select id="timeframeSelect"></select>
      </label>
      <label>
        Limit
        <input id="limitInput" type="number" min="1" max="500" value="100">
      </label>
      <label>
        Sort by
        <select id="sortColumnSelect"></select>
      </label>
      <label>
        Direction
        <select id="sortDirectionSelect">
          <option value="desc">Desc</option>
          <option value="asc">Asc</option>
        </select>
      </label>
      <label>
        Auto refresh
        <select id="refreshSelect">
          <option value="0">Off</option>
          <option value="5">5 sec</option>
          <option value="15">15 sec</option>
          <option value="30">30 sec</option>
        </select>
      </label>
      <button id="refreshButton" type="button">Refresh</button>
    </section>
    <section id="parameterControls" class="parameter-bar" aria-label="Layer parameters"></section>

    <main>
      <aside>
        <div id="layerList" class="layer-list"></div>
      </aside>
      <section class="content">
        <div id="summary" class="summary"></div>
        <div id="message" class="empty"></div>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    const state = {
      layers: [],
      activeLayer: null,
      options: null,
      timer: null,
      optionsRequestId: 0,
      rowsRequestId: 0,
    };

    const layerList = document.getElementById("layerList");
    const instrumentSelect = document.getElementById("instrumentSelect");
    const timeframeSelect = document.getElementById("timeframeSelect");
    const limitInput = document.getElementById("limitInput");
    const sortColumnSelect = document.getElementById("sortColumnSelect");
    const sortDirectionSelect = document.getElementById("sortDirectionSelect");
    const refreshSelect = document.getElementById("refreshSelect");
    const refreshButton = document.getElementById("refreshButton");
    const parameterControls = document.getElementById("parameterControls");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const summary = document.getElementById("summary");
    const message = document.getElementById("message");
    const tableHead = document.getElementById("tableHead");
    const tableBody = document.getElementById("tableBody");

    function setStatus(text, ok) {
      statusText.textContent = text;
      statusDot.classList.toggle("ok", Boolean(ok));
    }

    function assertServerOrigin() {
      if (window.location.protocol === "file:") {
        throw new Error(
          "Open Data Inspector from http://127.0.0.1:8765/ to connect to local data."
        );
      }
    }

    async function api(path, params = {}) {
      assertServerOrigin();
      const url = new URL(path, window.location.origin);
      Object.entries(params).forEach(([key, value]) => {
        if (value !== undefined && value !== null && String(value).length > 0) {
          url.searchParams.set(key, value);
        }
      });
      const response = await fetch(url);
      if (!response.ok) {
        const payload = await response.json().catch(() => ({}));
        throw new Error(payload.detail || response.statusText);
      }
      return response.json();
    }

    function renderLayers() {
      layerList.innerHTML = "";
      state.layers.forEach((layer) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `layer${state.activeLayer && state.activeLayer.id === layer.id ? " active" : ""}`;
        button.innerHTML = `
          <div class="layer-title">
            <span>${layer.label}</span>
            <span class="tag ${layer.has_delta_log ? "" : "missing"}">
              ${layer.has_delta_log ? "Delta" : "Missing"}
            </span>
          </div>
          <div class="layer-meta">${layer.row_count ?? "count off"} rows · v${layer.version ?? "n/a"}</div>
          <div class="layer-path">${layer.table_path}</div>
        `;
        button.addEventListener("click", () => selectLayer(layer.id));
        layerList.appendChild(button);
      });
    }

    function metric(label, value) {
      return `<div class="metric"><span>${label}</span><strong>${value ?? "n/a"}</strong></div>`;
    }

    function renderSummary() {
      const layer = state.activeLayer;
      if (!layer) {
        summary.innerHTML = "";
        return;
      }
      summary.innerHTML = [
        metric("Layer", layer.label),
        metric("Rows", layer.row_count ?? "count off"),
        metric("Version", layer.version),
        metric("Updated", layer.updated_at_utc),
      ].join("");
    }

    function fillSelect(select, values, preferredValue) {
      select.innerHTML = "";
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
      if (values.includes(preferredValue)) {
        select.value = preferredValue;
      }
    }

    function formatParameterLabel(column) {
      if (state.options && state.options.parameter_labels && state.options.parameter_labels[column]) {
        return state.options.parameter_labels[column];
      }
      return column.replaceAll("_", " ");
    }

    function valuesForSelectedInstrument(valuesByInstrument, fallbackValues) {
      if (!valuesByInstrument || !instrumentSelect.value) {
        return fallbackValues || [];
      }
      return valuesByInstrument[instrumentSelect.value] || fallbackValues || [];
    }

    function parameterColumns() {
      const columns = new Set();
      Object.keys((state.options && state.options.parameter_values) || {}).forEach((column) =>
        columns.add(column)
      );
      Object.keys(
        (state.options && state.options.parameter_values_by_instrument) || {}
      ).forEach((column) => columns.add(column));
      return Array.from(columns);
    }

    function parameterValues(column) {
      const byInstrument =
        state.options &&
        state.options.parameter_values_by_instrument &&
        state.options.parameter_values_by_instrument[column];
      const fallbackValues =
        (state.options && state.options.parameter_values && state.options.parameter_values[column]) ||
        [];
      return valuesForSelectedInstrument(byInstrument, fallbackValues);
    }

    function renderParameterControls() {
      const previousValues = {};
      parameterControls.querySelectorAll("select[data-column]").forEach((select) => {
        previousValues[select.dataset.column] = select.value;
      });
      parameterControls.innerHTML = "";
      if (!state.options) {
        return;
      }
      parameterColumns().forEach((column) => {
        const values = parameterValues(column);
        if (!Array.isArray(values) || !values.length) {
          return;
        }
        const label = document.createElement("label");
        const select = document.createElement("select");
        select.dataset.column = column;
        fillSelect(select, values, previousValues[column]);
        select.addEventListener("change", loadRows);
        label.append(formatParameterLabel(column), select);
        parameterControls.appendChild(label);
      });
    }

    function syncDependentControls() {
      const timeframes = valuesForSelectedInstrument(
        state.options && state.options.timeframes_by_instrument,
        state.options ? state.options.timeframes : []
      );
      fillSelect(timeframeSelect, timeframes, timeframeSelect.value);
      renderParameterControls();
    }

    function renderSortControls(preferTimestamp = false) {
      if (!state.activeLayer || !Array.isArray(state.activeLayer.columns)) {
        fillSelect(sortColumnSelect, []);
        return;
      }
      const preferredColumn = preferTimestamp
        ? state.activeLayer.timestamp_column
        : sortColumnSelect.value || state.activeLayer.timestamp_column;
      fillSelect(sortColumnSelect, state.activeLayer.columns, preferredColumn);
      if (!sortColumnSelect.value && state.activeLayer.timestamp_column) {
        sortColumnSelect.value = state.activeLayer.timestamp_column;
      }
    }

    function selectedParameters() {
      const params = {};
      parameterControls.querySelectorAll("select[data-column]").forEach((select) => {
        const column = select.dataset.column;
        if (!column || !select.value) {
          return;
        }
        if (column === state.activeLayer.series_column) {
          params.series = select.value;
        } else {
          params[column] = select.value;
        }
      });
      return params;
    }

    function selectedDisplayColumns() {
      if (!state.activeLayer || !Array.isArray(state.activeLayer.default_columns)) {
        return undefined;
      }
      return state.activeLayer.default_columns.length
        ? state.activeLayer.default_columns.join(",")
        : undefined;
    }

    async function loadOptions() {
      const layerId = state.activeLayer.id;
      const requestId = ++state.optionsRequestId;
      const options = await api("/api/data-inspector/options", { layer: layerId });
      if (requestId !== state.optionsRequestId || !state.activeLayer || state.activeLayer.id !== layerId) {
        return false;
      }
      state.options = options;
      fillSelect(instrumentSelect, state.options.instruments, instrumentSelect.value);
      syncDependentControls();
      return true;
    }

    function renderRows(payload) {
      tableHead.innerHTML = "";
      tableBody.innerHTML = "";
      message.className = "empty";
      if (!payload.rows.length) {
        message.textContent = "No rows for selected filters.";
        return;
      }
      message.textContent = "";
      const headRow = document.createElement("tr");
      payload.columns.forEach((column) => {
        const th = document.createElement("th");
        th.textContent = column;
        headRow.appendChild(th);
      });
      tableHead.appendChild(headRow);
      payload.rows.forEach((row) => {
        const tr = document.createElement("tr");
        payload.columns.forEach((column) => {
          const td = document.createElement("td");
          const value = row[column];
          td.textContent = value === null || value === undefined ? "" : String(value);
          tr.appendChild(td);
        });
        tableBody.appendChild(tr);
      });
    }

    async function loadRows() {
      if (!state.activeLayer || !instrumentSelect.value || !timeframeSelect.value) {
        message.textContent = "Select a layer with available instrument and timeframe values.";
        tableHead.innerHTML = "";
        tableBody.innerHTML = "";
        return;
      }
      const layerId = state.activeLayer.id;
      const requestId = ++state.rowsRequestId;
      message.textContent = "Loading rows...";
      message.className = "empty";
      tableHead.innerHTML = "";
      tableBody.innerHTML = "";
      const payload = await api("/api/data-inspector/rows", {
        layer: layerId,
        instrument: instrumentSelect.value,
        timeframe: timeframeSelect.value,
        limit: limitInput.value || 100,
        columns: selectedDisplayColumns(),
        sort_by: sortColumnSelect.value || undefined,
        sort_direction: sortDirectionSelect.value || "desc",
        ...selectedParameters(),
      });
      if (requestId !== state.rowsRequestId || !state.activeLayer || state.activeLayer.id !== layerId) {
        return;
      }
      renderRows(payload);
    }

    async function selectLayer(layerId) {
      state.activeLayer = state.layers.find((layer) => layer.id === layerId);
      renderLayers();
      renderSummary();
      renderSortControls(true);
      tableHead.innerHTML = "";
      tableBody.innerHTML = "";
      message.textContent = "";
      state.options = null;
      parameterControls.innerHTML = "";
      if (await loadOptions()) {
        await loadRows();
      }
    }

    async function refreshAll() {
      try {
        const previousLayerId = state.activeLayer && state.activeLayer.id;
        const payload = await api("/api/data-inspector/layers");
        state.layers = payload.layers;
        state.activeLayer =
          state.layers.find((layer) => layer.id === previousLayerId) || state.layers[0] || null;
        renderLayers();
        renderSummary();
        renderSortControls();
        if (state.activeLayer) {
          if (await loadOptions()) {
            await loadRows();
          }
        }
        setStatus(`Loaded ${new Date().toLocaleTimeString()}`, true);
      } catch (error) {
        message.textContent = error.message;
        message.className = "error";
        setStatus("Error", false);
      }
    }

    function configureTimer() {
      if (state.timer) {
        window.clearInterval(state.timer);
        state.timer = null;
      }
      const seconds = Number(refreshSelect.value);
      if (seconds > 0) {
        state.timer = window.setInterval(refreshAll, seconds * 1000);
      }
    }

    refreshButton.addEventListener("click", refreshAll);
    refreshSelect.addEventListener("change", configureTimer);
    instrumentSelect.addEventListener("change", () => {
      syncDependentControls();
      loadRows();
    });
    timeframeSelect.addEventListener("change", loadRows);
    limitInput.addEventListener("change", loadRows);
    sortColumnSelect.addEventListener("change", loadRows);
    sortDirectionSelect.addEventListener("change", loadRows);

    refreshAll();
  </script>
</body>
</html>
