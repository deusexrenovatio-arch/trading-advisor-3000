version: 1
change_policy_ref: docs/architecture/product-plane/contract-change-policy.md
compatibility_classes:
  strict:
    allowed_changes:
      - docs clarification only
      - additive optional field with schema+fixture+tests in one patch
    requires_major_version_bump:
      - remove required field
      - rename or type change of existing field
      - narrower enum or tighter validation on existing field
  additive:
    allowed_changes:
      - add optional metadata fields
      - widen enum with backward-safe value
    requires_major_version_bump:
      - remove existing field
      - change meaning of existing field
runtime_api_inventory_scope_decision:
  decision_id: F1-C-RUNTIME-API-INVENTORY-SCOPE-V1
  status: approved
  rationale: release-blocking runtime API inventory covers execution-control and readiness envelopes; read-only projection endpoints are governed by underlying DTO contracts and explicit exclusion rationale.
  exclusions:
    - path: /runtime/signal-events
      reason: response is a read-only projection of `signal_event.v1` records already covered by the core market/signal/execution contract boundary.
      covered_by_contracts:
        - signal_event
    - path: /runtime/strategy-registry
      reason: response is an operator-facing strategy inventory projection and not a release-blocking execution handshake envelope.
      covered_by_contracts:
        - runtime_bootstrap_config
        - runtime_operational_snapshot
