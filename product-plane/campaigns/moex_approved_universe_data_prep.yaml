campaign_name: moex_approved_universe_data_prep
target_stage: data_prep
canonical_output_dir: D:/TA3000-data/trading-advisor-3000-nightly/canonical/moex/baseline-4y-current
materialized_root: D:/TA3000-data/trading-advisor-3000-nightly/research/gold/current
runs_root: D:/TA3000-data/trading-advisor-3000-nightly/research/runs

dataset:
  dataset_version: moex_approved_universe_current_v1
  dataset_name: moex_approved_universe_current
  universe_id: universe-v1
  series_mode: contract
  timeframes:
    - 15m
    - 1h
    - 4h
    - 1d
  base_timeframe: 15m
  start_ts: "2021-04-01T00:00:00Z"
  end_ts: "2026-03-31T23:59:59Z"
  warmup_bars: 300
  split_method: holdout
  contract_ids: []
  instrument_ids: []

profiles:
  indicator_set_version: indicators-v1
  indicator_profile_version: core_v1
  derived_indicator_set_version: derived-v1
  derived_indicator_profile_version: core_v1

strategy_space:
  family_keys:
    - ma_cross
    - breakout
    - mean_reversion
    - trend_mtf_pullback_v1
    - volatility_squeeze_release_v1
    - trend_movement_cross_v1
    - channel_breakout_continuation_v1
    - range_vwap_band_reversion_v1
    - failed_breakout_reversal_v1
    - divergence_reversal_v1
  template_ids: []
  exclude_template_manifest_hashes: []
  max_parameter_combinations: 250000
  search_space_overrides: {}

backtest:
  param_batch_size: 500
  series_batch_size: 4
  backtest_timeframe: 15m
  fees_bps: 0.0
  slippage_bps: 5.0
  allow_short: true
  window_count: 3

ranking_policy:
  policy_id: robust_oos_v1
  metric_order:
    - total_return
    - profit_factor
    - max_drawdown
  require_out_of_sample_pass: true
  min_trade_count: 8
  max_drawdown_cap: 0.35
  min_positive_fold_ratio: 0.5
  stress_slippage_bps: 7.5
  min_parameter_stability: 0.35
  min_slippage_score: 0.45

projection_policy:
  selection_policy: all_policy_pass
  max_candidates_per_partition: 2
  min_robust_score: 0.55
  decision_lag_bars_max: 4

execution:
  force_rematerialize: false
  raise_on_error: true
