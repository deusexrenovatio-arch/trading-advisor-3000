version: "3.9"

services:
  runtime-profile:
    image: python:3.12-slim
    container_name: ta3000-runtime-profile
    working_dir: /workspace
    command: ["python", "-m", "trading_advisor_3000.app.runtime.ops.profile_server"]
    environment:
      PYTHONPATH: /workspace/src
      TA3000_PROFILE_HOST: 0.0.0.0
      TA3000_PROFILE_PORT: "8088"
      TA3000_ENVIRONMENT: ${TA3000_ENVIRONMENT:-staging-live-sim}
      TA3000_ENABLE_LIVE_EXECUTION: ${TA3000_ENABLE_LIVE_EXECUTION:-}
      TA3000_ENABLE_STOCKSHARP_BRIDGE: ${TA3000_ENABLE_STOCKSHARP_BRIDGE:-}
      TA3000_ENABLE_QUIK_CONNECTOR: ${TA3000_ENABLE_QUIK_CONNECTOR:-}
      TA3000_ENABLE_FINAM_TRANSPORT: ${TA3000_ENABLE_FINAM_TRANSPORT:-}
      TA3000_ENFORCE_LIVE_SECRETS: ${TA3000_ENFORCE_LIVE_SECRETS:-1}
      TA3000_RETRY_MAX_ATTEMPTS: ${TA3000_RETRY_MAX_ATTEMPTS:-3}
      TA3000_RETRY_BACKOFF_SECONDS: ${TA3000_RETRY_BACKOFF_SECONDS:-0.05}
      TA3000_STOCKSHARP_API_KEY: ${TA3000_STOCKSHARP_API_KEY:-}
      TA3000_FINAM_API_TOKEN: ${TA3000_FINAM_API_TOKEN:-}
    ports:
      - "8088:8088"
    volumes:
      - ../../..:/workspace:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8088/ready', timeout=2).status == 200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ta3000-production-like

  stocksharp-sidecar-stub:
    image: python:3.12-alpine
    container_name: ta3000-stocksharp-sidecar-stub
    command: ["python", "-m", "http.server", "18080"]
    ports:
      - "18080:18080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:18080', timeout=2).status == 200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ta3000-production-like

  postgres:
    image: postgres:16-alpine
    container_name: ta3000-postgres
    environment:
      POSTGRES_DB: ${TA3000_POSTGRES_DB:-ta3000}
      POSTGRES_USER: ${TA3000_POSTGRES_USER:-ta3000}
      POSTGRES_PASSWORD: ${TA3000_POSTGRES_PASSWORD:-ta3000-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TA3000_POSTGRES_USER:-ta3000} -d ${TA3000_POSTGRES_DB:-ta3000}"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ta3000-production-like

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: ta3000-prometheus-production-like
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    depends_on:
      runtime-profile:
        condition: service_started
    restart: unless-stopped
    networks:
      - ta3000-production-like

volumes:
  postgres-data:
  prometheus-data:

networks:
  ta3000-production-like:
    driver: bridge
