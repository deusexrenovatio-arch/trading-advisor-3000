global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ta3000-runtime-operational-profile"
    metrics_path: /metrics
    static_configs:
      - targets: ["runtime-profile:8088"]

  - job_name: "ta3000-sidecar-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["stocksharp-sidecar-gateway:18081"]
