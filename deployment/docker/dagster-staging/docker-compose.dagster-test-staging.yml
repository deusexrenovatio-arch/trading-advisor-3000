name: dagster-test-staging

services:
  dagster-test-webserver:
    image: ta3000-dagster-staging:latest
    container_name: ta3000-dagster-test-webserver
    working_dir: /workspace
    command:
      - dagster-webserver
      - -m
      - trading_advisor_3000.dagster_defs
      - -a
      - moex_historical_definitions
      - -h
      - 0.0.0.0
      - -p
      - "3000"
      - -d
      - /workspace
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      PYTHONPATH: /workspace/src
      TA3000_MOEX_HISTORICAL_DATA_ROOT: /ta3000-data/staging/test/moex-verification
      TA3000_MOEX_PRODUCT_RUNTIME_STAGING_ROOT: /ta3000-data/staging/product/moex-historical
      TA3000_MOEX_VERIFICATION_STAGING_ROOT: /ta3000-data/staging/test/moex-verification
      TA3000_MOEX_RUNTIME_INSTANCES_REGISTRY: /workspace/deployment/runtime-instances/moex-runtime-instances.v1.yaml
      TA3000_MOEX_CANONICALIZATION_SPARK_PROFILE: local
    ports:
      - "${TA3000_DAGSTER_TEST_PORT:-3001}:3000"
    volumes:
      - dagster-test-home:/opt/dagster/dagster_home
      - "../../..:/workspace:ro"
      - "${TA3000_MOEX_TEST_STAGING_ROOT_HOST:-D:/TA3000-data/trading-advisor-3000-verification}:/ta3000-data/staging/test/moex-verification"
      - "${TA3000_MOEX_PRODUCT_STAGING_ROOT_HOST:-D:/TA3000-data/trading-advisor-3000-nightly}:/ta3000-data/staging/product/moex-historical:ro"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:3000/server_info', timeout=2).status == 200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - ta3000-dagster-test

  dagster-test-daemon:
    image: ta3000-dagster-staging:latest
    container_name: ta3000-dagster-test-daemon
    working_dir: /workspace
    command:
      - dagster-daemon
      - run
      - -m
      - trading_advisor_3000.dagster_defs
      - -a
      - moex_historical_definitions
      - -d
      - /workspace
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      PYTHONPATH: /workspace/src
      TA3000_MOEX_HISTORICAL_DATA_ROOT: /ta3000-data/staging/test/moex-verification
      TA3000_MOEX_PRODUCT_RUNTIME_STAGING_ROOT: /ta3000-data/staging/product/moex-historical
      TA3000_MOEX_VERIFICATION_STAGING_ROOT: /ta3000-data/staging/test/moex-verification
      TA3000_MOEX_RUNTIME_INSTANCES_REGISTRY: /workspace/deployment/runtime-instances/moex-runtime-instances.v1.yaml
      TA3000_MOEX_CANONICALIZATION_SPARK_PROFILE: local
    volumes:
      - dagster-test-home:/opt/dagster/dagster_home
      - "../../..:/workspace:ro"
      - "${TA3000_MOEX_TEST_STAGING_ROOT_HOST:-D:/TA3000-data/trading-advisor-3000-verification}:/ta3000-data/staging/test/moex-verification"
      - "${TA3000_MOEX_PRODUCT_STAGING_ROOT_HOST:-D:/TA3000-data/trading-advisor-3000-nightly}:/ta3000-data/staging/product/moex-historical:ro"
    depends_on:
      dagster-test-webserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ta3000-dagster-test

volumes:
  dagster-test-home:

networks:
  ta3000-dagster-test:
    driver: bridge
