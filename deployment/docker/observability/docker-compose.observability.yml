version: "3.9"

services:
  metrics-file-exporter:
    image: python:3.12-alpine
    container_name: ta3000-metrics-file-exporter
    working_dir: /opt/bridge
    command: ["python", "metrics_file_server.py"]
    environment:
      METRICS_FILE: /runtime/observability.prometheus.metrics.txt
      METRICS_PORT: "9464"
    ports:
      - "9464:9464"
    volumes:
      - ./metrics_file_server.py:/opt/bridge/metrics_file_server.py:ro
      - ./runtime-artifacts:/runtime:ro
    restart: unless-stopped
    networks:
      - ta3000-observability

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: ta3000-prometheus
    depends_on:
      - metrics-file-exporter
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - ta3000-observability

  loki:
    image: grafana/loki:3.2.1
    container_name: ta3000-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - ta3000-observability

  promtail:
    image: grafana/promtail:3.2.1
    container_name: ta3000-promtail
    depends_on:
      - loki
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ./runtime-artifacts:/runtime:ro
    restart: unless-stopped
    networks:
      - ta3000-observability

  grafana:
    image: grafana/grafana:11.2.2
    container_name: ta3000-grafana
    depends_on:
      - prometheus
      - loki
      - promtail
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - ta3000-observability

volumes:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  ta3000-observability:
    driver: bridge
