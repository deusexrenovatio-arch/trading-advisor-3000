project_root_markers = [".git"]
model = "gpt-5.4"

[project]
name = "trading-advisor-3000"
require_trusted = true
trusted_project_reason = "MCP servers can access repo metadata and local runtime surfaces."

[profiles.base]
servers = ["github", "openai_docs"]

[profiles.ops]
servers = ["github", "openai_docs", "docker", "dagster"]

[profiles.data_readonly]
servers = ["github", "openai_docs", "docker", "dagster", "postgres_readonly", "duckdb"]

[mcp_servers.github]
command = "docker"
args = ["run", "--rm", "-i", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server", "stdio"]
required_env = ["TA3000_MCP_GITHUB_TOKEN", "GITHUB_PERSONAL_ACCESS_TOKEN"]
health_probe_args = ["--help"]

[mcp_servers.openai_docs]
url = "https://developers.openai.com/mcp"
required_env = []
health_probe_args = []

[mcp_servers.docker]
command = "docker"
args = ["mcp", "gateway", "run"]
required_env = []
health_probe_args = ["--help"]

[mcp_servers.dagster]
command = "uvx"
args = ["dagster-mcp"]
required_env = ["TA3000_MCP_DAGSTER_WORKSPACE"]
health_probe_args = ["--help"]

[mcp_servers.postgres_readonly]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-postgres", "${TA3000_MCP_POSTGRES_READONLY_DSN}"]
required_env = ["TA3000_MCP_POSTGRES_READONLY_DSN"]
health_probe_args = ["--help"]

[mcp_servers.duckdb]
command = "npx"
args = ["-y", "mcp-duckdb-local", "--db-path", "${TA3000_MCP_DUCKDB_PATH}"]
required_env = ["TA3000_MCP_DUCKDB_PATH"]
health_probe_args = ["--help"]
