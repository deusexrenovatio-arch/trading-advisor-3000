version: 1
source: product-reality-audit-data-to-signal-2026-05-06
source_refs:
  - docs/project-map/product-reality-audit-data-to-signal-2026-05-06.md
aggregation:
  cockpit_level: 1
  method: unweighted_average
  rule: >
    Cockpit cards aggregate scored nodes by level-1 architecture spine. Leaf
    scores remain keyed by node_id so the weakest block stays visible.
scale:
  min: 0
  max: 5
  meaning:
    "0": absent
    "1": docs/contracts or scaffolding only
    "2": code path exists, but product proof is weak
    "3": integrated or materialized proof exists, with important gaps
    "4": usable for current product work with known limits
    "5": operationally routine for the current product goal
scores:
  - node_id: data-plane
    score: 3.8
    label: Real materialized foundation
    note: Canonical and research Delta roots exist with row-count proof; strategy-readiness QC still incomplete.
    next_proof: Define strategy-ready data QC for target strategy families.
    source_refs:
      - docs/project-map/product-reality-audit-data-to-signal-2026-05-06.md
  - node_id: research-data-prep
    score: 4.0
    label: Strongest current layer
    note: Research gold frames and continuous-front frames are materialized and reusable.
    next_proof: Keep freshness tied to canonical refresh and campaign materialization locks.
    source_refs:
      - docs/project-map/product-reality-audit-data-to-signal-2026-05-06.md
  - node_id: strategy-registry
    score: 3.4
    label: Implemented and populated
    note: Strategy families/templates exist and are populated; hypothesis discipline is still uneven.
